name: Package Module

on:
  push:
    branches:
      - main
    paths:
      - module.json
      - README.md
      - lang/**
      - scripts/**
      - styles/**
      - templates/**
      - tools/build-package.ps1
      - .github/workflows/package-module.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build distributable ZIP
        shell: pwsh
        run: ./tools/build-package.ps1

      - name: Commit packaged ZIP if changed
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add foundry-vtt-status-tracker.zip

          if (git diff --cached --quiet) {
            Write-Host "Package already up to date."
            exit 0
          }

          git commit -m "Automated package refresh"
          git push