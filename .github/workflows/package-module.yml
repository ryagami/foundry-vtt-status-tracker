name: Package Module

on:
  push:
    branches:
      - main
    paths:
      - module.json
      - README.md
      - lang/**
      - scripts/**
      - styles/**
      - templates/**
      - tools/build-package.ps1
      - .github/workflows/package-module.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build distributable ZIP
        shell: pwsh
        run: ./tools/build-package.ps1

      - name: Read version from module.json
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content module.json | ConvertFrom-Json).version
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          artifacts: foundry-vtt-status-tracker.zip
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}